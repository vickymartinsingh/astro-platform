name: Build iOS IPA (unsigned)

# Triggers:
#   - workflow_dispatch: manual, pick which app(s) to build.
#   - push to main: auto-builds the customer (client-web) IPA whenever
#     code that affects the iOS bundle changes (the app folder, the
#     shared package, the version file, or the workflow itself). Skip
#     other paths so we don't burn macOS runner minutes on relay-only
#     changes. Each manual / auto run uploads the IPA as an artifact.
on:
  workflow_dispatch:
    inputs:
      app:
        description: Which app(s) to build
        type: choice
        default: all
        options:
          - all
          - client-web
          - astro-web
          - admin-web
  push:
    branches: [main]
    paths:
      - 'client-web/**'
      - 'astro-web/**'
      - 'admin-web/**'
      - 'shared/**'
      - 'brand/**'
      - '.github/workflows/ios.yml'
      - 'scripts/patch-native.mjs'
      - 'scripts/gen-icons.mjs'
      - 'com.astroseer.app.plist'
      - 'com.astroseer.astrologer.plist'
      - 'com.astroseer.admin.plist'

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - id: set
        run: |
          APP="${{ inputs.app }}"
          # push triggers don't carry inputs.app -> build ALL 3 apps so
          # the user gets fresh IPAs for customer + astrologer + admin
          # on every code change. Manual dispatch can still pick a
          # single app to save macOS runner minutes.
          if [ -z "$APP" ] && [ "${{ github.event_name }}" = "push" ]; then
            APP=all
          fi
          if [ "$APP" = "all" ]; then
            echo 'matrix={"app":["client-web","astro-web","admin-web"]}' >> "$GITHUB_OUTPUT"
          else
            echo "matrix={\"app\":[\"$APP\"]}" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: prepare
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare.outputs.matrix) }}
    name: ${{ matrix.app }}
    env:
      APP: ${{ matrix.app }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build (full pipeline, traced)
        id: build
        run: |
          set -x
          LOG="$RUNNER_TEMP/ios-build.log"
          exec > >(tee -a "$LOG") 2>&1
          set -euo pipefail

          echo "::group::env"
          echo "APP=$APP"
          node -v; npm -v
          xcodebuild -version
          pod --version
          sw_vers
          echo "::endgroup::"

          # Read the version baked into shared/appVersion.js so the
          # produced .ipa filename includes "1.0.<build>". That single
          # source of truth is also what patch-native bakes into the
          # native build.gradle / Info.plist, so the filename is always
          # in lockstep with what installs.
          VERSION=$(node -e "console.log(require('./shared/appVersion.js').APP_VERSION)")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          # SFX maps to the Firebase plist filename at repo root. It MUST
          # match the bundle ID Capacitor uses for the iOS app (read
          # from each app's capacitor.config.json `appId`):
          #   client-web -> com.astroseer.mobile  -> com.astroseer.mobile.plist
          #   astro-web  -> com.astroseer.astrologer -> com.astroseer.astrologer.plist
          #   admin-web  -> com.astroseer.admin    -> com.astroseer.admin.plist
          # Using a plist whose BUNDLE_ID doesn't match the app crashes
          # Firebase at init -> app dies on launch.
          case "$APP" in
            client-web)  IPA="AstroSeer-Customer-v$VERSION" ;    SFX=mobile ;;
            astro-web)   IPA="AstroSeer-Astrologer-v$VERSION" ;  SFX=astrologer ;;
            admin-web)   IPA="AstroSeer-Admin-v$VERSION" ;       SFX=admin ;;
            *)           IPA="App-v$VERSION" ;                   SFX=app ;;
          esac
          echo "ipa=$IPA" >> "$GITHUB_OUTPUT"
          # Per-app Firebase iOS config the user generated for the new
          # com.astroseer.* bundle IDs (committed at repo root).
          # EXPORT both PLIST and SFX -- the later "node -e" block reads
          # process.env.SFX to pick the server.url per app, and without
          # the export the spawned node process saw SFX undefined and
          # silently fell back to the customer URL for ALL THREE apps
          # (so the astrologer + admin IPAs opened the customer site,
          # which is exactly the "all are just client" bug). Exporting
          # makes the variable visible to every child process for the
          # remainder of the run step.
          export SFX
          export PLIST="com.astroseer.$SFX.plist"
          echo "using iOS plist: $PLIST (SFX=$SFX)"

          echo "::group::install deps"
          npm ci || npm install
          echo "::endgroup::"

          echo "::group::web build"
          CAPACITOR=true npm run build --workspace="$APP"
          echo "::endgroup::"

          echo "::group::source icons (best effort)"
          node scripts/gen-icons.mjs || echo "icon gen skipped"
          echo "::endgroup::"

          # iOS plugin strip:
          #  - @capacitor/push-notifications: APNs needs paid Apple
          #    program -> always strip for these unsigned builds.
          #  - @codetrix-studio/capacitor-google-auth: native plugin
          #    pulls GoogleSignIn 6.2 which transitively requires
          #    GTMSessionFetcher < 3.0, but @capacitor-firebase/
          #    authentication 8.x pulls FirebaseAuth 12.7 which needs
          #    GTMSessionFetcher >= 3.4. The two are mutually exclusive
          #    in CocoaPods. We always strip the codetrix plugin on
          #    iOS; the Firebase JS SDK's signInWithRedirect handles
          #    Google sign-in via Safari just fine without a native
          #    plugin.
          #  - @capacitor-firebase/authentication: only strip when we
          #    have no iOS Firebase config (no plist). With a plist
          #    Firebase native init succeeds and we keep it.
          # iOS native plugin strip - "minimal shell" approach.
          #
          # Every native plugin we ship on iOS is one more thing that
          # can crash on launch (missing entitlement, missing Info.plist
          # key, mismatched Firebase plist, CocoaPods version
          # conflict). The web bundle already has the Firebase JS SDK
          # and handles auth/messaging/storage just fine in a WKWebView,
          # so for the unsigned-Sideloadly distribution path we strip
          # ALL optional native plugins and ship a clean shell:
          #   - @capacitor/push-notifications: needs APNs paid program
          #     entitlements that a personal Apple ID cannot grant
          #     -> instant crash on re-sign install.
          #   - @capacitor/local-notifications: needs specific Info.plist
          #     usage strings on iOS 17+, easy to misconfigure.
          #   - @codetrix-studio/capacitor-google-auth: CocoaPods
          #     conflict with FirebaseAuth (GTMSessionFetcher version
          #     windows do not overlap).
          #   - @capacitor-firebase/authentication: native Firebase init
          #     is the most fragile thing in this stack; any plist
          #     mismatch or missing URL scheme crashes the app at
          #     launch. signInWithRedirect via Safari (Firebase JS SDK)
          #     gives the same UX without the native risk.
          # Native @capacitor/app + @capacitor/core + @capacitor/ios
          # always stay - they ARE the runtime.
          echo "::group::strip iOS-incompatible plugins"
          node -e "const fs=require('fs');const app=process.env.APP;const f=app+'/package.json';const j=JSON.parse(fs.readFileSync(f));const strip=['@capacitor/push-notifications','@capacitor/local-notifications','@codetrix-studio/capacitor-google-auth','@capacitor-firebase/authentication'];for(const k of strip){if(j.dependencies)delete j.dependencies[k];}fs.writeFileSync(f,JSON.stringify(j,null,2)+'\n');console.log('iOS plugins kept:',Object.keys(j.dependencies||{}).filter(k=>k.startsWith('@capacitor')).join(',')||'(core only)');"
          echo "::endgroup::"

          # Strip every plugin-config block from capacitor.config.json
          # so Capacitor's plugin loader has nothing to wire to a
          # missing native counterpart (which throws and hangs the
          # splash forever).
          echo "::group::strip plugin config from capacitor.config.json"
          node -e "const fs=require('fs');const app=process.env.APP;const f=app+'/capacitor.config.json';const c=JSON.parse(fs.readFileSync(f));if(c.plugins){delete c.plugins.GoogleAuth;delete c.plugins.FirebaseAuthentication;delete c.plugins.PushNotifications;delete c.plugins.LocalNotifications;}fs.writeFileSync(f,JSON.stringify(c,null,2)+'\n');console.log('plugin config now:',Object.keys(c.plugins||{}).join(',')||'(none)');"
          echo "::endgroup::"

          # Bundled-app mode (REVERTED from remote-URL shell).
          # User feedback: remote shells "look like a website" - splash
          # was actually a browser-style load. With bundled mode the
          # static Next export sits INSIDE the IPA and Capacitor loads
          # it from the local file system, so the app opens instantly
          # like a real native app. All Firebase / relay calls still
          # hit the live backend; only the static UI shell is local.
          #
          # We DROP any leftover server.url that prior runs may have
          # written into capacitor.config.json (the file is committed,
          # so a stale URL would persist). allowNavigation is kept so
          # external auth popups + payment redirects keep working.
          echo "::group::strip server.url for bundled-app mode"
          node -e "const fs=require('fs');const app=process.env.APP;const f=app+'/capacitor.config.json';const c=JSON.parse(fs.readFileSync(f));if(c.server){delete c.server.url;delete c.server.cleartext;c.server.allowNavigation=Array.from(new Set([...(c.server.allowNavigation||[]),'astroseer.in','*.astroseer.in','*.firebaseapp.com','accounts.google.com','*.google.com','apis.google.com','*.googleapis.com']));if(!c.server.allowNavigation.length&&!c.server.iosScheme&&!c.server.androidScheme){delete c.server;}}fs.writeFileSync(f,JSON.stringify(c,null,2)+'\n');console.log('bundled mode: server.url removed for',app);"
          echo "::endgroup::"

          # Capacitor 8 defaults to SPM; the capacitor-swift-pm mirror
          # drifts and breaks plugin compile. Force CocoaPods so
          # Capacitor builds from the exact matching npm package.
          # NOTE: iOS keeps the default capacitor:// scheme - errors
          # stay readable (the https scheme made them opaque "Script
          # error.") and the auth crash is already fixed in code.
          echo "::group::cap add ios (CocoaPods)"
          ( cd "$APP" && npx cap add ios --packagemanager Cocoapods )
          echo "::endgroup::"

          echo "::group::ios firebase config"
          if [ -f "$PLIST" ]; then
            cp "$PLIST" "$APP/ios/App/App/GoogleService-Info.plist";
            echo "$PLIST installed -> GoogleService-Info.plist (native Google ON: $APP)";
          else
            echo "no $PLIST - native Google OFF on iOS for $APP (web fallback)";
          fi
          echo "::endgroup::"

          echo "::group::ios assets (icon + splash on theme bg)"
          # $APP/assets/{logo,splash,splash-dark}.png are committed
          # (produced by scripts/gen-assets.mjs from brand/logo.png).
          # Royal palette: dark maroon background #1A0F0F matches the
          # pre-hydration boot cover in _document.js so the splash ->
          # app handoff is seamless (no purple/indigo flash, no white
          # flash). Strict brand rule: purple is prohibited everywhere.
          ( cd "$APP" && npx capacitor-assets generate --ios \
              --iconBackgroundColor '#1A0F0F' \
              --iconBackgroundColorDark '#1A0F0F' \
              --splashBackgroundColor '#1A0F0F' \
              --splashBackgroundColorDark '#1A0F0F' ) \
            || echo "asset gen skipped"
          echo "::endgroup::"

          echo "::group::cap sync ios"
          ( cd "$APP" && npx cap sync ios )
          echo "::endgroup::"

          echo "::group::patch-native (best effort)"
          node scripts/patch-native.mjs || echo "patch-native skipped"
          echo "::endgroup::"

          echo "::group::pod install"
          ( cd "$APP/ios/App" && (pod install --repo-update || pod install) )
          ls -la "$APP/ios/App"
          test -d "$APP/ios/App/App.xcworkspace" || { echo "NO WORKSPACE"; exit 1; }
          echo "::endgroup::"

          echo "::group::xcodebuild (unsigned, CocoaPods)"
          ( cd "$APP" && xcodebuild \
              -workspace ios/App/App.xcworkspace \
              -scheme App \
              -configuration Release \
              -sdk iphoneos \
              -derivedDataPath "$RUNNER_TEMP/dd" \
              -destination 'generic/platform=iOS' \
              clean build \
              CODE_SIGNING_ALLOWED=NO \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGN_IDENTITY= \
              CODE_SIGN_ENTITLEMENTS= \
              PROVISIONING_PROFILE_SPECIFIER= \
              DEVELOPMENT_TEAM= )
          echo "::endgroup::"

          echo "::group::package ipa"
          APP_PATH="$RUNNER_TEMP/dd/Build/Products/Release-iphoneos/App.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "App.app not found; searching:"
            find "$RUNNER_TEMP/dd" -name '*.app' -maxdepth 6 -print || true
            exit 1
          fi
          mkdir -p "$RUNNER_TEMP/Payload"
          cp -R "$APP_PATH" "$RUNNER_TEMP/Payload/"
          ( cd "$RUNNER_TEMP" && zip -qry "$GITHUB_WORKSPACE/$IPA.ipa" Payload )
          ls -lh "$GITHUB_WORKSPACE/$IPA.ipa"
          echo "::endgroup::"

      - name: Upload build log (always)
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-log-${{ matrix.app }}
          path: ${{ runner.temp }}/ios-build.log
          if-no-files-found: warn
          retention-days: 14

      - name: Upload IPA artifact
        if: ${{ success() }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.build.outputs.ipa }}-ipa
          path: ${{ steps.build.outputs.ipa }}.ipa
          if-no-files-found: error
          retention-days: 14
