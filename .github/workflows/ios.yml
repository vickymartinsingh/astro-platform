name: Build iOS IPA (unsigned)

# Manual, ONE app at a time (dropdown, default client-web). Produces an
# UNSIGNED .ipa. The whole pipeline runs as a single traced script and
# ALWAYS uploads a full log artifact ("ios-build-log") so the exact
# failing command is visible without digging through step logs.
on:
  workflow_dispatch:
    inputs:
      app:
        description: Which app to build
        type: choice
        default: client-web
        options:
          - client-web
          - astro-web
          - admin-web

concurrency:
  group: ios-${{ github.ref }}-${{ inputs.app }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-14
    env:
      APP: ${{ inputs.app }}
    name: ${{ inputs.app }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build (full pipeline, traced)
        id: build
        run: |
          set -x
          LOG="$RUNNER_TEMP/ios-build.log"
          exec > >(tee -a "$LOG") 2>&1
          set -euo pipefail

          echo "::group::env"
          echo "APP=$APP"
          node -v; npm -v
          xcodebuild -version
          pod --version
          sw_vers
          echo "::endgroup::"

          case "$APP" in
            client-web)  IPA=AstroConnect ;;
            astro-web)   IPA=AstroConnect-Astrologer ;;
            admin-web)   IPA=AstroConnect-Admin ;;
            *)           IPA=App ;;
          esac
          echo "IPA=$IPA" >> "$GITHUB_ENV"
          echo "ipa=$IPA" >> "$GITHUB_OUTPUT"

          echo "::group::install deps"
          npm ci || npm install
          echo "::endgroup::"

          echo "::group::web build"
          CAPACITOR=true npm run build --workspace="$APP"
          echo "::endgroup::"

          echo "::group::source icons (best effort)"
          node scripts/gen-icons.mjs || echo "icon gen skipped"
          echo "::endgroup::"

          echo "::group::strip firebase native plugins"
          node -e "const f=process.env.APP+'/package.json';const fs=require('fs');const j=JSON.parse(fs.readFileSync(f));for(const k of ['@capacitor-firebase/authentication','@capacitor/push-notifications']){if(j.dependencies)delete j.dependencies[k];}fs.writeFileSync(f,JSON.stringify(j,null,2)+'\n');console.log('stripped',f);"
          echo "::endgroup::"

          echo "::group::cap add ios"
          ( cd "$APP" && npx cap add ios )
          # Capacitor 8 uses Swift Package Manager: it generates
          # App.xcodeproj (no .xcworkspace, no Podfile).
          test -d "$APP/ios/App/App.xcodeproj" || { echo "NO XCODEPROJ"; ls -la "$APP/ios/App" || true; exit 1; }
          echo "::endgroup::"

          echo "::group::ios assets (best effort)"
          ( cd "$APP" && npx capacitor-assets generate --ios ) || echo "asset gen skipped"
          echo "::endgroup::"

          echo "::group::cap sync ios"
          ( cd "$APP" && npx cap sync ios )
          echo "::endgroup::"

          echo "::group::patch-native (best effort)"
          node scripts/patch-native.mjs || echo "patch-native skipped"
          echo "::endgroup::"

          echo "::group::resolve SPM packages"
          ( cd "$APP" && xcodebuild \
              -project ios/App/App.xcodeproj \
              -scheme App \
              -resolvePackageDependencies )
          echo "::endgroup::"

          echo "::group::xcodebuild (unsigned build, SPM)"
          ( cd "$APP" && xcodebuild \
              -project ios/App/App.xcodeproj \
              -scheme App \
              -configuration Release \
              -sdk iphoneos \
              -derivedDataPath "$RUNNER_TEMP/dd" \
              -destination 'generic/platform=iOS' \
              clean build \
              CODE_SIGNING_ALLOWED=NO \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGN_IDENTITY= \
              CODE_SIGN_ENTITLEMENTS= \
              PROVISIONING_PROFILE_SPECIFIER= \
              DEVELOPMENT_TEAM= )
          echo "::endgroup::"

          echo "::group::package ipa"
          APP_PATH="$RUNNER_TEMP/dd/Build/Products/Release-iphoneos/App.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "App.app not found at $APP_PATH; searching:"
            find "$RUNNER_TEMP/dd" -name '*.app' -maxdepth 6 -print || true
            exit 1
          fi
          mkdir -p "$RUNNER_TEMP/Payload"
          cp -R "$APP_PATH" "$RUNNER_TEMP/Payload/"
          ( cd "$RUNNER_TEMP" && zip -qry "$GITHUB_WORKSPACE/$IPA.ipa" Payload )
          ls -lh "$GITHUB_WORKSPACE/$IPA.ipa"
          echo "::endgroup::"

      - name: Upload build log (always)
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-log
          path: ${{ runner.temp }}/ios-build.log
          if-no-files-found: warn
          retention-days: 14

      - name: Upload IPA artifact
        if: ${{ success() }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.build.outputs.ipa }}-ipa
          path: ${{ steps.build.outputs.ipa }}.ipa
          if-no-files-found: error
          retention-days: 14
