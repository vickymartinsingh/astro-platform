name: Build iOS IPA (unsigned)

# Manual. Default builds ALL three apps in one run (each is an
# independent job, so one failing app does not stop the others). You
# can also pick a single app. Produces UNSIGNED .ipa artifacts.
on:
  workflow_dispatch:
    inputs:
      app:
        description: Which app(s) to build
        type: choice
        default: all
        options:
          - all
          - client-web
          - astro-web
          - admin-web

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - id: set
        run: |
          if [ "${{ inputs.app }}" = "all" ]; then
            echo 'matrix={"app":["client-web","astro-web","admin-web"]}' >> "$GITHUB_OUTPUT"
          else
            echo "matrix={\"app\":[\"${{ inputs.app }}\"]}" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: prepare
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare.outputs.matrix) }}
    name: ${{ matrix.app }}
    env:
      APP: ${{ matrix.app }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build (full pipeline, traced)
        id: build
        run: |
          set -x
          LOG="$RUNNER_TEMP/ios-build.log"
          exec > >(tee -a "$LOG") 2>&1
          set -euo pipefail

          echo "::group::env"
          echo "APP=$APP"
          node -v; npm -v
          xcodebuild -version
          pod --version
          sw_vers
          echo "::endgroup::"

          case "$APP" in
            client-web)  IPA=AstroConnect ;;
            astro-web)   IPA=AstroConnect-Astrologer ;;
            admin-web)   IPA=AstroConnect-Admin ;;
            *)           IPA=App ;;
          esac
          echo "ipa=$IPA" >> "$GITHUB_OUTPUT"

          echo "::group::install deps"
          npm ci || npm install
          echo "::endgroup::"

          echo "::group::web build"
          CAPACITOR=true npm run build --workspace="$APP"
          echo "::endgroup::"

          echo "::group::source icons (best effort)"
          node scripts/gen-icons.mjs || echo "icon gen skipped"
          echo "::endgroup::"

          # Always strip push (APNs needs the paid Apple program).
          # Strip @capacitor-firebase/authentication ONLY when there is
          # no iOS Firebase config - with GoogleService-Info.plist
          # present, Firebase iOS initialises fine and native Google
          # sign-in works, so we keep the plugin.
          echo "::group::strip firebase native plugins"
          node -e "const fs=require('fs');const app=process.env.APP;const f=app+'/package.json';const j=JSON.parse(fs.readFileSync(f));const keepGoogle=app==='client-web'&&fs.existsSync('GoogleService-Info.plist');const strip=['@capacitor/push-notifications'];if(!keepGoogle)strip.push('@capacitor-firebase/authentication');for(const k of strip){if(j.dependencies)delete j.dependencies[k];}fs.writeFileSync(f,JSON.stringify(j,null,2)+'\n');console.log('keepGoogle='+keepGoogle+' stripped='+strip.join(','));"
          echo "::endgroup::"

          # Capacitor 8 defaults to SPM; the capacitor-swift-pm mirror
          # drifts and breaks plugin compile. Force CocoaPods so
          # Capacitor builds from the exact matching npm package.
          # NOTE: iOS keeps the default capacitor:// scheme - errors
          # stay readable (the https scheme made them opaque "Script
          # error.") and the auth crash is already fixed in code.
          echo "::group::cap add ios (CocoaPods)"
          ( cd "$APP" && npx cap add ios --packagemanager Cocoapods )
          echo "::endgroup::"

          echo "::group::ios firebase config"
          if [ "$APP" = "client-web" ] && [ -f GoogleService-Info.plist ]; then
            cp GoogleService-Info.plist \
              "$APP/ios/App/App/GoogleService-Info.plist";
            echo "GoogleService-Info.plist installed - native Google ON (client)";
          else
            echo "no plist for $APP - native Google OFF on iOS (web fallback)";
          fi
          echo "::endgroup::"

          echo "::group::ios assets (best effort)"
          ( cd "$APP" && npx capacitor-assets generate --ios ) || echo "asset gen skipped"
          echo "::endgroup::"

          echo "::group::cap sync ios"
          ( cd "$APP" && npx cap sync ios )
          echo "::endgroup::"

          echo "::group::patch-native (best effort)"
          node scripts/patch-native.mjs || echo "patch-native skipped"
          echo "::endgroup::"

          echo "::group::pod install"
          ( cd "$APP/ios/App" && (pod install --repo-update || pod install) )
          ls -la "$APP/ios/App"
          test -d "$APP/ios/App/App.xcworkspace" || { echo "NO WORKSPACE"; exit 1; }
          echo "::endgroup::"

          echo "::group::xcodebuild (unsigned, CocoaPods)"
          ( cd "$APP" && xcodebuild \
              -workspace ios/App/App.xcworkspace \
              -scheme App \
              -configuration Release \
              -sdk iphoneos \
              -derivedDataPath "$RUNNER_TEMP/dd" \
              -destination 'generic/platform=iOS' \
              clean build \
              CODE_SIGNING_ALLOWED=NO \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGN_IDENTITY= \
              CODE_SIGN_ENTITLEMENTS= \
              PROVISIONING_PROFILE_SPECIFIER= \
              DEVELOPMENT_TEAM= )
          echo "::endgroup::"

          echo "::group::package ipa"
          APP_PATH="$RUNNER_TEMP/dd/Build/Products/Release-iphoneos/App.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "App.app not found; searching:"
            find "$RUNNER_TEMP/dd" -name '*.app' -maxdepth 6 -print || true
            exit 1
          fi
          mkdir -p "$RUNNER_TEMP/Payload"
          cp -R "$APP_PATH" "$RUNNER_TEMP/Payload/"
          ( cd "$RUNNER_TEMP" && zip -qry "$GITHUB_WORKSPACE/$IPA.ipa" Payload )
          ls -lh "$GITHUB_WORKSPACE/$IPA.ipa"
          echo "::endgroup::"

      - name: Upload build log (always)
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-log-${{ matrix.app }}
          path: ${{ runner.temp }}/ios-build.log
          if-no-files-found: warn
          retention-days: 14

      - name: Upload IPA artifact
        if: ${{ success() }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.build.outputs.ipa }}-ipa
          path: ${{ steps.build.outputs.ipa }}.ipa
          if-no-files-found: error
          retention-days: 14
