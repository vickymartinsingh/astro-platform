name: Build iOS IPA (unsigned)

# Manual, ONE app at a time. Pick the app in the Run workflow dropdown
# (default client-web). Produces an UNSIGNED .ipa artifact (sideload
# with AltStore/Sideloadly, or re-sign with an Apple Developer account).
on:
  workflow_dispatch:
    inputs:
      app:
        description: Which app to build
        type: choice
        default: client-web
        options:
          - client-web
          - astro-web
          - admin-web

concurrency:
  group: ios-${{ github.ref }}-${{ inputs.app }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-14
    env:
      APP: ${{ inputs.app }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    name: ${{ inputs.app }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Diagnostics
        run: |
          echo "app=$APP"
          node -v; npm -v
          xcodebuild -version || true
          pod --version || true
          sw_vers || true

      - name: Resolve IPA name
        id: meta
        run: |
          set -euxo pipefail
          case "$APP" in
            client-web)  IPA=AstroConnect ;;
            astro-web)   IPA=AstroConnect-Astrologer ;;
            admin-web)   IPA=AstroConnect-Admin ;;
            *)           IPA=App ;;
          esac
          echo "ipa=$IPA" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: |
          set -euxo pipefail
          npm ci || npm install

      - name: Build web (static export -> out/)
        run: npm run build --workspace=$APP
        env:
          CAPACITOR: 'true'

      - name: Generate branded source icons (best effort)
        run: node scripts/gen-icons.mjs || echo "icon gen skipped"

      # Firebase native plugins crash iOS on launch without an iOS
      # Firebase config + paid Apple Program. Strip them for the iOS
      # build ONLY (CI-ephemeral). The app still works (email login,
      # browsing, chat, calls).
      - name: Strip Firebase native plugins for iOS
        run: |
          set -euxo pipefail
          node -e "const f=process.env.APP+'/package.json';const fs=require('fs');const j=JSON.parse(fs.readFileSync(f));for(const k of ['@capacitor-firebase/authentication','@capacitor/push-notifications']){if(j.dependencies)delete j.dependencies[k];}fs.writeFileSync(f,JSON.stringify(j,null,2)+'\n');console.log('stripped',f);"

      - name: Add iOS platform
        working-directory: ${{ inputs.app }}
        run: |
          set -euxo pipefail
          npx cap add ios
          test -d ios/App/App.xcworkspace || { echo "no workspace"; ls -la ios || true; exit 1; }

      - name: Generate iOS icons + splash (best effort)
        working-directory: ${{ inputs.app }}
        run: npx capacitor-assets generate --ios || echo "asset gen skipped"

      - name: Sync web + native into iOS project
        working-directory: ${{ inputs.app }}
        run: |
          set -euxo pipefail
          npx cap sync ios

      - name: Pod install (fallback to repo-update)
        working-directory: ${{ inputs.app }}/ios/App
        run: |
          set -euxo pipefail
          pod install || pod install --repo-update

      - name: Inject mic/camera permissions (Info.plist)
        run: node scripts/patch-native.mjs || echo "patch-native skipped"

      - name: Verify iOS workspace
        working-directory: ${{ inputs.app }}
        run: |
          set -euxo pipefail
          test -d ios/App/App.xcworkspace || { ls -la ios || true; exit 1; }

      # Unsigned BUILD (not archive: archive is far more signing
      # sensitive). The .app is taken straight from build products.
      - name: Build unsigned (.app)
        working-directory: ${{ inputs.app }}
        run: |
          set -euxo pipefail
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath "$RUNNER_TEMP/dd" \
            -destination 'generic/platform=iOS' \
            clean build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY= \
            CODE_SIGN_ENTITLEMENTS= \
            PROVISIONING_PROFILE_SPECIFIER= \
            DEVELOPMENT_TEAM=

      - name: Package unsigned .ipa
        run: |
          set -euxo pipefail
          APP_PATH="$RUNNER_TEMP/dd/Build/Products/Release-iphoneos/App.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "App.app not found; searching..."
            find "$RUNNER_TEMP/dd" -name "*.app" -maxdepth 6 -print || true
            exit 1
          fi
          mkdir -p "$RUNNER_TEMP/Payload"
          cp -R "$APP_PATH" "$RUNNER_TEMP/Payload/"
          ( cd "$RUNNER_TEMP" && zip -qry "$GITHUB_WORKSPACE/${{ steps.meta.outputs.ipa }}.ipa" Payload )
          ls -lh "$GITHUB_WORKSPACE/${{ steps.meta.outputs.ipa }}.ipa"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.ipa }}-ipa
          path: ${{ steps.meta.outputs.ipa }}.ipa
          if-no-files-found: error
          retention-days: 14
