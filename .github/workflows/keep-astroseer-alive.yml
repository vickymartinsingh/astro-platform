# Keeps the AstroSeer API's Render free-tier dyno warm.
#
# Render's free tier sleeps a service after 15 minutes of idle. The
# first request after sleep takes 30-60 seconds (cold-start + worker
# spinup) which kills our chart-load UX. This workflow fires a tiny
# GET to /health every 10 minutes - well inside Render's 15-minute
# sleep window - so the dyno never enters idle.
#
# Cron syntax: */10 * * * * = every 10 minutes, every hour, every day.
#
# Notes:
#   - GitHub Actions cron has a known reliability tax: scheduled jobs
#     can be delayed by 10-30 minutes during high load on the runner
#     pool. For sub-10-min precision use an external pinger like
#     UptimeRobot (free, 5-min cadence) or cron-job.org (free, 1-min
#     cadence). The 10-minute schedule here is the *best case*; in
#     practice we land somewhere in 10-25 min, still inside the
#     15-min Render sleep window most of the time.
#   - The workflow runs on the smallest available runner (Ubuntu)
#     and the entire job takes ~5 seconds, so GitHub Actions
#     minutes consumed are negligible (well under the free quota).
#   - Manual trigger via workflow_dispatch is included so you can
#     wake the dyno on demand from the Actions tab without waiting
#     for the next cron tick.
name: Keep AstroSeer API warm

on:
  schedule:
    # Every 10 minutes - inside Render free tier's 15-min sleep timer.
    - cron: '*/10 * * * *'
  workflow_dispatch:        # manual "Run workflow" button in the UI
    inputs:
      target:
        description: 'Override URL to ping (default = production API)'
        required: false
        default: 'https://astroseer-api.onrender.com/health'

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping AstroSeer /health
        env:
          TARGET: ${{ github.event.inputs.target || 'https://astroseer-api.onrender.com/health' }}
        run: |
          echo "Pinging $TARGET ..."
          # -f fails the step on 4xx/5xx so we get a red X if AstroSeer
          # is genuinely down (vs cold-starting which returns 200 once
          # the worker boots).
          # -m 60: full timeout 60s to cover cold-start latency.
          # --retry 3 --retry-delay 5: tolerate transient socket errors
          # without failing the job.
          curl -sS -f -m 60 --retry 3 --retry-delay 5 "$TARGET" || {
            echo "Ping failed - AstroSeer may be down or had a >60s cold start."
            exit 1
          }
          echo ""
          echo "OK - AstroSeer responded."

      - name: Also pre-warm the relay's kundli action
        # The relay's first cold-call needs to read settings/kundliApi
        # from Firestore (50-100 ms) + the firebase-admin SDK init
        # (~300 ms). Pre-warming here means the first real customer
        # chart request lands on a warm Vercel function.
        run: |
          curl -sS -m 30 'https://astro-platform-push-relay.vercel.app/api/kundli?probe=1' \
            > /dev/null 2>&1 || true
          echo "Relay probe done (best-effort)."
