ext {
    // 2026-06-08: kept minSdk at 24 - Cordova framework 14.0.1
    // bundled with Capacitor refuses minSdk < 24, so 23 fails to
    // build. Android 7.0+ still covers ~95% of active devices on
    // Play. The "not compatible" report we got is more likely a
    // Play Store cache / device-specific issue; users on Android
    // 6 (rare) would need a separate older-build pipeline if we
    // ever want to support them.
    minSdkVersion = 24
    compileSdkVersion = 36
    targetSdkVersion = 36
    androidxActivityVersion = '1.11.0'
    androidxAppCompatVersion = '1.7.1'
    androidxCoordinatorLayoutVersion = '1.3.0'
    androidxCoreVersion = '1.17.0'
    androidxFragmentVersion = '1.8.9'
    coreSplashScreenVersion = '1.2.0'
    androidxWebkitVersion = '1.14.0'
    junitVersion = '4.13.2'
    androidxJunitVersion = '1.3.0'
    androidxEspressoCoreVersion = '3.7.0'
    cordovaAndroidVersion = '14.0.1'
}